global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "yugabyte-tserver"
    metrics_path: "/prometheus-metrics"
    static_configs:
      - targets:
          - "NODE1:9000"
          - "NODE2:9000"
          - "NODE3:9000"

  - job_name: "yugabyte-master"
    metrics_path: "/prometheus-metrics"
    static_configs:
      - targets:
          - "NODE1:7000"
          - "NODE2:7000"
          - "NODE3:7000"

  - job_name: "postgres-exporter"
    static_configs:
      - targets:
          - "NODE1:9187"
          - "NODE2:9187"
          - "NODE3:9187"
