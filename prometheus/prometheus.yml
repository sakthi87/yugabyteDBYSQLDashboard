global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "yugabyte-master"
    metrics_path: "/prometheus-metrics"
    static_configs:
      - targets: ["yb:7000"]

  - job_name: "yugabyte-tserver"
    metrics_path: "/prometheus-metrics"
    static_configs:
      - targets: ["yb:9000"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["pg_exporter:9187"]
